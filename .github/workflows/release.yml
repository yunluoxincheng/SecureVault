name: Release

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release when this workflow runs from a v* tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4096m -Dfile.encoding=UTF-8"

jobs:
  validate:
    name: Validate Release Gates
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run release gate checks
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon --stacktrace `
            :shared:common:desktopTest `
            :desktopApp:desktopTest `
            :androidApp:testDebugUnitTest `
            :androidApp:assembleDebug `
            :androidApp:assembleRelease `
            detekt

  build-android:
    name: Build Android APK
    runs-on: windows-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release APK
        shell: pwsh
        run: .\gradlew.bat --no-daemon --stacktrace :androidApp:assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securevault-android
          if-no-files-found: error
          path: |
            androidApp/build/outputs/apk/release/*.apk
            androidApp/build/outputs/mapping/release/mapping.txt

  build-windows-desktop:
    name: Build Windows Desktop MSI
    runs-on: windows-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package release MSI
        shell: pwsh
        run: .\gradlew.bat --no-daemon --stacktrace :desktopApp:packageReleaseMsi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securevault-windows
          if-no-files-found: error
          path: desktopApp/build/compose/binaries/**/*.msi

  publish:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs:
      - build-android
      - build-windows-desktop
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: securevault-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem -Path "release-artifacts" -Recurse -File
          if (-not $files) {
            throw "No release artifacts were downloaded."
          }

          $paths = $files | ForEach-Object { $_.FullName }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $paths --clobber
          } else {
            gh release create $tag $paths --verify-tag --title $tag --notes "Automated SecureVault release for $tag."
          }
